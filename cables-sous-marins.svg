<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#071520"/>
      <stop offset="100%" style="stop-color:#0d2a40"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#ocean)"/>
  <!-- Grid lines -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#1a3a5c" stroke-width="0.5"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#1a3a5c" stroke-width="0.5"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#1a3a5c" stroke-width="0.5"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#1a3a5c" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#1a3a5c" stroke-width="0.5"/>
  <!-- Cable lines -->
  <path d="M 0 340 Q 200 250 400 310 Q 600 370 800 290" stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 0 380 Q 150 300 350 330 Q 550 360 800 310" stroke="#0080ff" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 0 310 Q 250 220 450 280 Q 650 340 800 260" stroke="#00aacc" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Landing points -->
  <circle cx="80" cy="336" r="5" fill="#00d4ff" opacity="0.9"/>
  <circle cx="240" cy="263" r="4" fill="#00d4ff" opacity="0.8"/>
  <circle cx="400" cy="310" r="6" fill="#00d4ff" opacity="1"/>
  <circle cx="560" cy="358" r="4" fill="#00d4ff" opacity="0.8"/>
  <circle cx="720" cy="291" r="5" fill="#00d4ff" opacity="0.9"/>
  <!-- Glow band -->
  <rect x="0" y="195" width="800" height="12" fill="url(#glow)" opacity="0.4"/>
  <!-- Title text -->
  <text x="400" y="110" font-family="Georgia, serif" font-size="28" fill="#00d4ff" text-anchor="middle" opacity="0.95">Câbles Sous-Marins — Intelligence</text>
  <text x="400" y="150" font-family="Arial, sans-serif" font-size="14" fill="#7ab8d4" text-anchor="middle" letter-spacing="3">ANALYSE GÉOPOLITIQUE · DATA · CARTOGRAPHIE</text>
  <!-- Stats -->
  <rect x="130" y="380" width="130" height="48" rx="6" fill="#0a2035" stroke="#00d4ff" stroke-width="0.8" opacity="0.9"/>
  <text x="195" y="400" font-family="Arial, sans-serif" font-size="18" fill="#00d4ff" text-anchor="middle" font-weight="bold">693</text>
  <text x="195" y="418" font-family="Arial, sans-serif" font-size="11" fill="#7ab8d4" text-anchor="middle">câbles répertoriés</text>
  <rect x="335" y="380" width="130" height="48" rx="6" fill="#0a2035" stroke="#00d4ff" stroke-width="0.8" opacity="0.9"/>
  <text x="400" y="400" font-family="Arial, sans-serif" font-size="18" fill="#00d4ff" text-anchor="middle" font-weight="bold">1 910</text>
  <text x="400" y="418" font-family="Arial, sans-serif" font-size="11" fill="#7ab8d4" text-anchor="middle">points d'atterrissage</text>
  <rect x="540" y="380" width="130" height="48" rx="6" fill="#0a2035" stroke="#00d4ff" stroke-width="0.8" opacity="0.9"/>
  <text x="605" y="400" font-family="Arial, sans-serif" font-size="18" fill="#00d4ff" text-anchor="middle" font-weight="bold">99%</text>
  <text x="605" y="418" font-family="Arial, sans-serif" font-size="11" fill="#7ab8d4" text-anchor="middle">trafic internet mondial</text>
</svg>
